    <style>
        :root {
            --teal-deep: #0d4f5c;
            --teal-mid: #1a6b7a;
            --teal-light: #2e8a9a;
            --teal-water: #3fa9bf;
            --gold: #e8b842;
            --gold-light: #f5d97a;
            --gold-deep: #c89324;
            --cream: #f5ecd7;
            --cream-soft: #faf4e3;
            --dark-navy: #0a2a35;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: #2a2a2a;
            background-color: var(--cream-soft);
            margin: 0;
        }

        /* ========== NAVIGATION ========== */
        .navbar {
            background: linear-gradient(135deg, var(--teal-deep), var(--teal-mid)) !important;
            box-shadow: 0 4px 20px rgba(13, 79, 92, 0.25);
            padding: 12px 0;
        }
        .navbar-brand {
            color: var(--cream) !important;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand img { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .navbar-nav .nav-link {
            color: var(--cream) !important;
            font-weight: 500;
            margin: 0 8px;
            position: relative;
            transition: color 0.3s ease;
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active { color: var(--gold-light) !important; }
        .navbar-nav .nav-link::after {
            content: "";
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }
        .navbar-nav .nav-link:hover::after,
        .navbar-nav .nav-link.active::after { width: 70%; }
        .navbar-toggler { border-color: var(--gold); }
        .navbar-toggler-icon { filter: invert(1); }

        /* ========== PAGE HEADER ========== */
        .page-header {
            position: relative;
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--cream);
            overflow: hidden;
            background:
                    linear-gradient(135deg, rgba(10, 42, 53, 0.7), rgba(13, 79, 92, 0.55)),
                    url('images/image2.jpeg') center/cover no-repeat;
            padding: 100px 20px 80px;
        }
        .page-header::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(10, 42, 53, 0.4) 100%);
            z-index: 1;
        }
        .page-header-content { position: relative; z-index: 2; max-width: 800px; }
        .page-eyebrow {
            display: inline-block;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-light);
            padding: 8px 20px;
            border: 1px solid var(--gold);
            border-radius: 30px;
            margin-bottom: 24px;
            background: rgba(13, 79, 92, 0.3);
            backdrop-filter: blur(4px);
        }
        .page-header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 18px;
            text-shadow: 2px 2px 0 var(--teal-deep), 4px 4px 20px rgba(0,0,0,0.5);
            line-height: 1;
        }
        .page-header p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            color: var(--cream-soft);
            opacity: 0.95;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ========== WAVE DIVIDER ========== */
        .wave-divider {
            position: relative;
            height: 80px;
            margin-top: -80px;
            z-index: 3;
            pointer-events: none;
        }
        .wave-divider svg { width: 100%; height: 100%; display: block; }

        /* ========== GALLERY ========== */
        .gallery-section {
            padding: 60px 0 100px;
            background: var(--cream-soft);
        }

        .gallery-grid {
            column-count: 3;
            column-gap: 20px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(13, 79, 92, 0.12);
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .gallery-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 36px rgba(13, 79, 92, 0.25);
            border-color: var(--gold);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img { transform: scale(1.05); }

        .gallery-item::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 79, 92, 0.5), transparent 50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .gallery-item:hover::after { opacity: 1; }

        .gallery-item .zoom-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 50px;
            height: 50px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 2;
        }

        .gallery-item:hover .zoom-icon {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .gallery-item .zoom-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--dark-navy);
            stroke-width: 2.5;
            fill: none;
        }

        /* ========== LIGHTBOX ========== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(10, 42, 53, 0.95);
            align-items: center;
            justify-content: center;
            padding: 30px;
            backdrop-filter: blur(8px);
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 12px;
            border: 3px solid var(--gold);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--gold);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--dark-navy);
            font-weight: 700;
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .lightbox-close:hover { transform: rotate(90deg) scale(1.1); }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            background: var(--gold);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-navy);
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .lightbox-nav:hover { background: var(--gold-light); transform: translateY(-50%) scale(1.1); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        /* ========== FOOTER ========== */
        footer {
            background: linear-gradient(135deg, var(--dark-navy), var(--teal-deep));
            color: var(--cream);
            padding: 50px 20px 25px;
            text-align: center;
        }
        .footer-logo { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 18px; }
        .social-icons { display: flex; justify-content: center; gap: 18px; margin-bottom: 20px; }
        .social-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(232, 184, 66, 0.15);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .social-icon:hover { background: var(--gold); transform: translateY(-3px); }
        .social-icon svg {
            width: 22px;
            height: 22px;
            color: var(--gold-light);
            transition: color 0.3s ease;
        }

        .social-icon:hover svg {
            color: var(--dark-navy);
        }
        .footer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 25px auto;
            max-width: 300px;
        }
        footer p { margin: 0; color: rgba(245, 236, 215, 0.7); font-size: 0.9rem; letter-spacing: 0.5px; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 992px) {
            .gallery-grid { column-count: 2; }
        }

        @media (max-width: 576px) {
            .gallery-grid { column-count: 1; }
            .page-header { min-height: 40vh; padding: 80px 20px 60px; }
            .lightbox-nav { width: 44px; height: 44px; }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }

        footer .author-link {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dotted rgba(245, 217, 122, 0.5);
            transition: color 0.25s ease, border-color 0.25s ease;
        }
        footer .author-link:hover {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
    </style>
</head>

        'images/IMG_9113.jpeg', 'images/IMG_9114.jpeg'
    ];
    let currentIndex = 0;

    function openLightbox(index) {
        currentIndex = index;
        document.getElementById('lightbox-img').src = galleryImages[index];
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    function navLightbox(direction) {
        currentIndex = (currentIndex + direction + galleryImages.length) % galleryImages.length;
        document.getElementById('lightbox-img').src = galleryImages[currentIndex];
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
        if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', function(e) {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navLightbox(-1);
        if (e.key === 'ArrowRight') navLightbox(1);
    });
</script>
